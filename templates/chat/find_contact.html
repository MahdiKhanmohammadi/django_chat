{% extends '_layout.html' %}
{% load static %}

{% block title %} Chat Rooms {% endblock %}


{% block container %}

<div class="modal fade show" tabindex="-1" id="addContact" aria-modal="true" role="dialog" style="display: block;">
    <div class="modal-dialog modal-dialog-centered modal-sm">
        <div class="modal-content border-0">
            <div class="modal-body p-4">
                <h4 class="pb-2">Search by UserName</h4>
                <div class="form-group">
                    <div class="form-control-wrap">
                        <div class="form-control-icon start">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor"
                                class="bi bi-search" viewBox="0 0 16 16">
                                <path
                                    d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001q.044.06.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1 1 0 0 0-.115-.1zM12 6.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0">
                                </path>
                            </svg><!-- search -->
                        </div>

                        <input type="text" class="form-control form-control-solid" id="search-username"
                            placeholder="Enter username">


                    </div>
                </div><!-- .form-group -->
                <ul class="tyn-media-list gap gap-3 pt-4" id="contact-container">

                </ul><!-- .tyn-media-list -->
            </div><!-- .modal-body -->
            <button class="btn btn-md btn-icon btn-pill btn-white shadow position-absolute top-0 end-0 mt-n3 me-n3"
                data-bs-dismiss="modal">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-x-lg"
                    viewBox="0 0 16 16">
                    <path
                        d="M2.146 2.854a.5.5 0 1 1 .708-.708L8 7.293l5.146-5.147a.5.5 0 0 1 .708.708L8.707 8l5.147 5.146a.5.5 0 0 1-.708.708L8 8.707l-5.146 5.147a.5.5 0 0 1-.708-.708L7.293 8z">
                    </path>
                </svg><!-- x-lg -->
            </button><!-- modal-close -->
        </div><!-- .modal-content -->
    </div><!-- .modal-dialog -->
</div>



{% endblock %}
{% block scripts %}
<script src="https://ajax.googleapis.com/ajax/libs/jquery/1.12.0/jquery.min.js"></script>
<script src="https://unpkg.com/sweetalert/dist/sweetalert.min.js"></script>

<script src="{% static 'js/search_by_ajax.js' %}"></script>

{% endblock %}
